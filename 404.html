<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - الصفحة غير موجودة | QCV</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" type="image/png" href="https://i.postimg.cc/L59BQSvq/qcv-app-icon-final.png">
    <link rel="stylesheet" href="components.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root{--bg:#f9fafb;--card:#ffffff;--border:#e5e7eb;--accent:#0003c9;--sky:#2563eb;--text:#1a1a2e;--muted:#6b7280;--light:#9ca3af}
        *{box-sizing:border-box;margin:0;padding:0}
        body{background:var(--bg);color:var(--text);font-family:'Cairo',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;position:relative}

        .bg-glow{position:fixed;width:500px;height:500px;border-radius:50%;filter:blur(120px);opacity:0.08;pointer-events:none}
        .glow-1{background:var(--accent);top:-15%;right:-10%;animation:float1 8s ease-in-out infinite}
        .glow-2{background:var(--sky);bottom:-15%;left:-10%;animation:float2 10s ease-in-out infinite}
        @keyframes float1{0%,100%{transform:translate(0,0)}50%{transform:translate(-30px,30px)}}
        @keyframes float2{0%,100%{transform:translate(0,0)}50%{transform:translate(30px,-30px)}}

        .container{text-align:center;position:relative;z-index:2;padding:20px}
        .error-code{font-size:8rem;font-weight:900;background:linear-gradient(135deg,var(--accent),var(--sky));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;margin-bottom:10px;animation:popIn 0.5s cubic-bezier(0.16,1,0.3,1)}
        @keyframes popIn{0%{transform:scale(0.5);opacity:0}100%{transform:scale(1);opacity:1}}

        .robot{font-size:5rem;margin-bottom:20px;animation:wave 2s ease-in-out infinite}
        @keyframes wave{0%,100%{transform:rotate(0)}25%{transform:rotate(-10deg)}75%{transform:rotate(10deg)}}

        .error-title{font-size:1.6rem;font-weight:800;margin-bottom:10px}
        .error-msg{color:var(--muted);font-size:1rem;margin-bottom:35px;max-width:450px;line-height:1.7}

        .btn-group{display:flex;gap:14px;justify-content:center;flex-wrap:wrap}
        .btn{padding:13px 28px;border-radius:50px;font-weight:700;font-size:0.9rem;cursor:pointer;font-family:'Cairo',sans-serif;border:none;text-decoration:none;display:inline-flex;align-items:center;gap:8px;transition:all 0.25s}
        .btn-primary{background:var(--accent);color:#000}
        .btn-primary:hover{background:#60a5fa;transform:translateY(-2px);box-shadow:0 8px 25px rgba(56,189,248,0.3)}
        .btn-ghost{background:transparent;color:var(--text);border:1px solid var(--border)}
        .btn-ghost:hover{border-color:var(--accent);color:var(--accent)}

        .links{margin-top:50px;display:flex;gap:25px;justify-content:center}
        .links a{color:var(--muted);text-decoration:none;font-size:0.85rem;font-weight:600;transition:color 0.2s}
        .links a:hover{color:var(--accent)}

        .footer{position:fixed;bottom:20px;color:var(--muted);font-size:0.75rem}
    </style>
</head>
<body>

<div class="bg-glow glow-1"></div>
<div class="bg-glow glow-2"></div>

<div class="container">
    <div class="robot"><i class="fas fa-robot"></i></div>
    <div class="error-code">404</div>
    <div class="error-title">الصفحة غير موجودة!</div>
    <div class="error-msg">يبدو إنك وصلت لصفحة مش موجودة أو اتغير رابطها. تأكد من صحة الرابط أو رجع للصفحة الرئيسية.</div>
    <div class="btn-group">
        <a href="index.html" class="btn btn-primary"><i class="fas fa-home"></i> الصفحة الرئيسية</a>
        <a href="javascript:history.back()" class="btn btn-ghost">&#8594; رجوع</a>
    </div>
    <div class="links">
        <a href="index.html#features">المميزات</a>
        <a href="index.html#pricing">التسعير</a>
        <a href="help.html">المساعدة</a>
        <a href="login.html">تسجيل الدخول</a>
    </div>
</div>

<div class="footer">QCV &copy; 2026 - جميع الحقوق محفوظة</div>



<script src="js/site-settings.js"></script>
<script src="js/notify-sounds.js"></script>
</body>
</html>
