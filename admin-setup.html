<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إعداد المدير | QCV</title>
    <meta name="robots" content="noindex, nofollow">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{background:#f9fafb;color:#1a1a2e;font-family:'Cairo',sans-serif;min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px}
        .box{background:#ffffff;border:1px solid #e5e7eb;border-radius:20px;padding:45px 40px;width:100%;max-width:460px;box-shadow:0 25px 60px rgba(0,0,0,0.08);text-align:center}
        .logo{font-size:2.5rem;font-weight:900;margin-bottom:8px}
        .logo span{color:#0003c9}
        .sub{color:#6b7280;font-size:0.85rem;margin-bottom:30px}
        .input-group{margin-bottom:18px;text-align:right}
        .input-group label{display:block;font-size:0.82rem;color:#6b7280;margin-bottom:6px;font-weight:600}
        .input-group input{width:100%;padding:14px 16px;background:#ffffff;border:1px solid #e5e7eb;color:#1a1a2e;border-radius:12px;outline:none;font-family:'Cairo',sans-serif;font-size:0.9rem;transition:all 0.2s}
        .input-group input:focus{border-color:#0003c9;box-shadow:0 0 0 3px rgba(0,3,201,0.15)}
        .btn{width:100%;padding:14px;background:#0003c9;color:#ffffff;border:none;border-radius:12px;font-weight:800;font-size:1rem;cursor:pointer;font-family:'Cairo',sans-serif;margin-top:10px;transition:all 0.2s}
        .btn:hover{background:#0002a8}
        .btn:disabled{opacity:0.5;cursor:not-allowed}
        .msg{margin-top:15px;font-size:0.85rem;font-weight:600}
        .ok{color:#0003c9}.err{color:#ef4444}
        .blocked{display:none;padding:30px;text-align:center}
        .blocked h2{font-size:1.3rem;color:#ef4444;margin-bottom:12px}
        .blocked p{color:#6b7280;font-size:0.9rem;line-height:1.7}
        .blocked .icon{font-size:3rem;margin-bottom:16px}
        .links{margin-top:25px}
        .links a{color:#0003c9;text-decoration:none;font-weight:700;font-size:0.88rem}
        .spinner{display:inline-block;width:20px;height:20px;border:3px solid rgba(0,0,0,0.1);border-top-color:#0003c9;border-radius:50%;animation:spin 0.7s linear infinite;margin-bottom:12px}
        @keyframes spin{to{transform:rotate(360deg)}}
    </style>
</head>
<body>
    <div class="box">
        <div class="logo">Q<span>CV</span></div>
        <div class="sub">إعداد حساب المدير</div>

        <!-- Loading -->
        <div id="loadingState">
            <div class="spinner"></div>
            <p style="color:#6b7280;font-size:0.85rem">جاري التحقق...</p>
        </div>

        <!-- Blocked state -->
        <div class="blocked" id="blockedState">
            <div class="icon"><i class="fas fa-lock"></i></div>
            <h2>تم إعداد المدير بالفعل</h2>
            <p>تم إنشاء حساب المدير مسبقاً. لا يمكن إنشاء حساب مدير آخر.<br>استخدم حساب المدير الحالي للدخول من <a href="admin.html" style="color:#0003c9">لوحة التحكم</a></p>
        </div>

        <!-- Form state -->
        <div id="formState" style="display:none">
            <div class="input-group">
                <label>اسم المدير</label>
                <input type="text" id="name" placeholder="الاسم الكامل">
            </div>
            <div class="input-group">
                <label>البريد الإلكتروني</label>
                <input type="email" id="email" placeholder="admin@example.com">
            </div>
            <div class="input-group">
                <label>كلمة المرور</label>
                <input type="password" id="pass" placeholder="6 أحرف على الأقل">
            </div>

            <button class="btn" id="createBtn" onclick="createAdmin()">إنشاء حساب المدير</button>
            <div class="msg" id="msg1"></div>

            <div class="links">
                <a href="admin.html">الذهاب للوحة التحكم ←</a>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";
        import { getDatabase, ref, get, set } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA2pXUB830VPoro1BChDY0Ii5Gt_BTrK8I",
            authDomain: "qwcv-1cfad.firebaseapp.com",
            projectId: "qwcv-1cfad",
            storageBucket: "qwcv-1cfad.firebasestorage.app",
            messagingSenderId: "792471802122",
            appId: "1:792471802122:web:808e04099afc90315aaaf3",
            databaseURL: "https://qwcv-1cfad-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // Check if admin already exists
        async function checkAdminExists() {
            try {
                const snap = await get(ref(db, 'admins'));
                return snap.exists() && Object.keys(snap.val() || {}).length > 0;
            } catch (e) {
                return false;
            }
        }

        const adminExists = await checkAdminExists();

        if (adminExists) {
            document.getElementById('loadingState').style.display = 'none';
            document.getElementById('blockedState').style.display = 'block';
        } else {
            document.getElementById('loadingState').style.display = 'none';
            document.getElementById('formState').style.display = 'block';
        }

        window.createAdmin = async function() {
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const pass = document.getElementById('pass').value;
            const msg = document.getElementById('msg1');
            const btn = document.getElementById('createBtn');

            if (!name || !email || !pass) {
                msg.className = 'msg err'; msg.textContent = 'املأ كل الحقول'; return;
            }
            if (pass.length < 6) {
                msg.className = 'msg err'; msg.textContent = 'كلمة المرور 6 أحرف على الأقل'; return;
            }

            // Double-check no admin exists before creating
            const exists = await checkAdminExists();
            if (exists) {
                msg.className = 'msg err'; msg.textContent = 'تم إنشاء حساب المدير بالفعل';
                document.getElementById('formState').style.display = 'none';
                document.getElementById('blockedState').style.display = 'block';
                return;
            }

            btn.textContent = 'جاري الإنشاء...'; btn.disabled = true;

            try {
                const cred = await createUserWithEmailAndPassword(auth, email, pass);

                await set(ref(db, 'admins/' + cred.user.uid), {
                    uid: cred.user.uid,
                    name: name,
                    email: email,
                    createdAt: Date.now()
                });

                await set(ref(db, 'users/' + cred.user.uid), {
                    uid: cred.user.uid,
                    name: name,
                    email: email,
                    plan: 'unlimited',
                    role: 'admin',
                    banned: false,
                    registeredAt: Date.now(),
                    lastLogin: Date.now()
                });

                await signOut(auth);

                msg.className = 'msg ok';
                msg.textContent = 'تم إنشاء حساب المدير بنجاح! يمكنك الدخول من admin.html';
                document.getElementById('formState').style.display = 'none';
                document.getElementById('blockedState').innerHTML = '<div class="icon">✅</div><h2 style="color:#0003c9">تم إنشاء حساب المدير بنجاح!</h2><p>يمكنك الآن الدخول إلى لوحة التحكم</p><div class="links"><a href="admin.html">الدخول للوحة التحكم ←</a></div>';
                document.getElementById('blockedState').style.display = 'block';
            } catch (err) {
                msg.className = 'msg err';
                const m = {
                    'auth/email-already-in-use': 'البريد مستخدم بالفعل',
                    'auth/weak-password': 'كلمة المرور ضعيفة',
                    'auth/invalid-email': 'البريد غير صالح'
                };
                msg.textContent = m[err.code] || 'خطأ: ' + err.message;
            }

            btn.textContent = 'إنشاء حساب المدير'; btn.disabled = false;
        };
    </script>
<script src="js/notify-sounds.js"></script>
</body>
</html>
