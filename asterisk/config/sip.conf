; =============================================================
; Asterisk Configuration for Cloud Call Center
; =============================================================

; ─── PJSIP Configuration ─────────────────────────────────────

[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060

[transport-tcp]
type=transport
protocol=tcp
bind=0.0.0.0:5060

[transport-wss]
type=transport
protocol=wss
bind=0.0.0.0:8089

; ─── Template for Extensions ──────────────────────────────────

[endpoint-internal](!)
type=endpoint
context=from-internal
disallow=all
allow=opus,ulaw
direct_media=no
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes
transport=transport-wss

[audio](!)
type=audio
codecs=opus,ulaw

; ─── Agent Extensions (SIP.js clients) ───────────────────────

[100](!,endpoint-internal)
auth=100
aors=100

[100](endpoint)
type=auth
auth_type=user
password=agent100pass

[100](aor)
type=aor
max_contacts=1
default_expiration=120

; ─── Queue Configuration ──────────────────────────────────────

[queues]
context=sales-queue
music=default
strategy=ringall
timeout=30
maxlen=50
joinempty=yes
leavewhenempty=no

; ─── Dialplan (Extensions) ────────────────────────────────────

[general]
static=yes
writeprotect=no

[from-internal]
exten => _X.,1,NoOp(Outgoing call from ${CALLERID(num)} to ${EXTEN})
 same => n,Dial(PJSIP/${EXTEN},30)
 same => n,Hangup()

[sales-queue]
exten => s,1,Answer()
 same => n,Queue(sales-queue,tT,,,120)
 same => n,Hangup()

; ─── ARI Application ─────────────────────────────────────────

[callcenter]
type=application
endpoint=ari-client
