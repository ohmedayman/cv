    <style>
        :root{--bg:#080d1a;--sidebar:#0c1222;--card:#111a2e;--border:#1c2844;--accent:#38bdf8;--sky:#2563eb;--text:#f1f5f9;--muted:#5a6a85;--light:#8494ad}
        *{box-sizing:border-box;margin:0;padding:0}
        body{background:var(--bg);color:var(--text);font-family:'Inter','Cairo',sans-serif;min-height:100vh}

        .page-header{background:var(--sidebar);border-bottom:1px solid var(--border);padding:16px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
        .logo{font-size:1.5rem;font-weight:900;color:#fff;display:flex;align-items:center;gap:6px}
        .logo span{color:var(--accent)}
        .header-nav{display:flex;gap:12px;align-items:center}
        .header-nav a{color:var(--muted);text-decoration:none;font-weight:600;font-size:0.85rem;padding:8px 16px;border-radius:8px;transition:all 0.2s}
        .header-nav a:hover{color:var(--text);background:rgba(255,255,255,0.05)}
        .header-nav a.active{color:var(--accent)}
        .btn-primary{background:var(--accent);color:#000;padding:8px 20px;border-radius:8px;font-weight:700;font-size:0.85rem;text-decoration:none;border:none;cursor:pointer;font-family:inherit;transition:all 0.2s}
        .btn-primary:hover{background:#60a5fa;transform:translateY(-1px)}

        .hero{text-align:center;padding:60px 32px 40px}
        .hero h1{font-size:2.5rem;font-weight:900;margin-bottom:12px;background:linear-gradient(135deg,var(--accent),var(--sky));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .hero p{font-size:1.1rem;color:var(--muted);max-width:600px;margin:0 auto}

        .filters{display:flex;justify-content:center;gap:10px;padding:20px 32px;flex-wrap:wrap}
        .filter-btn{padding:8px 20px;border-radius:24px;border:1px solid var(--border);background:transparent;color:var(--light);font-weight:600;font-size:0.85rem;cursor:pointer;font-family:inherit;transition:all 0.2s}
        .filter-btn:hover{border-color:var(--accent);color:var(--accent)}
        .filter-btn.active{background:var(--accent);color:#000;border-color:var(--accent)}

        .templates-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:24px;padding:20px 40px 60px;max-width:1400px;margin:0 auto}

        .tpl-card{background:var(--card);border:2px solid var(--border);border-radius:16px;overflow:hidden;cursor:pointer;transition:all 0.3s}
        .tpl-card:hover{border-color:var(--accent);transform:translateY(-4px);box-shadow:0 20px 40px rgba(0,0,0,0.3)}
        .tpl-preview{height:400px;background:#fff;overflow:hidden;position:relative;border-bottom:1px solid var(--border);display:flex;align-items:flex-start}
        .tpl-preview-inner{transform:scale(0.32);transform-origin:top left;width:312%;flex-shrink:0}
        .tpl-info{padding:16px 20px}
        .tpl-name{font-size:1.05rem;font-weight:800;margin-bottom:4px}
        .tpl-desc{font-size:0.82rem;color:var(--muted);margin-bottom:10px}
        .tpl-meta{display:flex;align-items:center;justify-content:space-between}
        .tpl-badge{padding:4px 10px;border-radius:6px;font-size:0.7rem;font-weight:700}
        .tpl-use{padding:6px 16px;background:var(--accent);color:#000;border:none;border-radius:8px;font-weight:700;font-size:0.8rem;cursor:pointer;font-family:inherit;transition:all 0.2s}
        .tpl-use:hover{background:#60a5fa}

        .footer{text-align:center;padding:40px;border-top:1px solid var(--border);color:var(--muted);font-size:0.82rem}
        .footer a{color:var(--accent);text-decoration:none}

        @media(max-width:768px){.templates-grid{grid-template-columns:1fr;padding:16px}.hero h1{font-size:1.8rem}.page-header{padding:12px 16px}.header-nav{display:none}}
    </style>
</head>
<body>
    <div class="page-header">
        <div class="logo">Q<span>CV</span></div>
        <div class="header-nav">
            <a href="index.html">Home</a>
            <a href="templates.html" class="active">Templates</a>
            <a href="editor.html">Editor</a>
            <a href="login.html" class="btn-primary">Get Started</a>
        </div>
    </div>

    <div class="hero">
        <h1>15+ Professional CV Templates</h1>
        <p>Choose the design that fits you. All templates are ATS-compatible and exportable to PDF</p>
    </div>

    <div class="filters">
        <button class="filter-btn active" onclick="filterTpl('all',this)">All (15)</button>
        <button class="filter-btn" onclick="filterTpl('ats',this)">ATS</button>
        <button class="filter-btn" onclick="filterTpl('classic',this)">Classic</button>
        <button class="filter-btn" onclick="filterTpl('modern',this)">Modern</button>
        <button class="filter-btn" onclick="filterTpl('creative',this)">Creative</button>
    </div>

    <div class="templates-grid" id="tplGrid"></div>

    <div class="footer">
        <p>© 2026 QCV — جميع الحقوق محفوظة | <a href="index.html">العودة للرئيسية</a></p>
    </div>

    <script src="js/template-engine.js"></script>
    <script>
        const sampleData = {
            name: 'Ahmad Mostafa',
            title: 'Senior UI/UX Designer',
            email: 'ahmad@example.com',
            phone: '+20 123 456 789',
            location: 'Cairo, Egypt',
            linkedin: 'linkedin.com/in/ahmadmostafa',
            summary: 'Product designer specializing in resume systems, portfolio storytelling, and candidate experiences. Experienced in ATS optimization and UX writing.',
            skills: ['UI Design', 'Figma', 'Prototyping', 'User Research', 'Design Systems', 'CSS', 'Wireframing', 'Adobe XD'],
            experience: [
                { role: 'Senior Product Designer', company: 'TechCorp', duration: '2022 - Present', description: '- Redesigned application flows, lifting completion by 28%\n- Led design system overhaul for 5 products\n- Mentored junior designers' },
                { role: 'UX Designer', company: 'StartupX', duration: '2019 - 2022', description: '- Built recruiter dashboards and scoring tools\n- Conducted 50+ user research sessions\n- Improved onboarding conversion by 35%' }
            ],
            education: [
                { degree: 'B.Sc. Computer Science', school: 'Cairo University', duration: '2015 - 2019', description: '- GPA: 3.7/4.0\n- Dean\'s List' }
            ],
            languages: [
                { name: 'Arabic', level: 'Native' },
                { name: 'English', level: 'Fluent' }
            ]
        };

        const categories = {classic:'كلاسيكي',modern:'عصري',creative:'إبداعي',ats:'ATS'};
        const catColors = {classic:'#38bdf8',modern:'#2563eb',creative:'#8b5cf6',ats:'#1d4ed8'};

        const FREE_TEMPLATES = ['classic'];
        let userPlan = 'free';

        // Check user plan from Firebase
        (async () => {
            try {
                const { initializeApp } = await import("https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js");
                const { getAuth, onAuthStateChanged } = await import("https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js");
                const { getDatabase, ref, get } = await import("https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js");
                const app = initializeApp({apiKey:"AIzaSyA2pXUB830VPoro1BChDY0Ii5Gt_BTrK8I",authDomain:"qwcv-1cfad.firebaseapp.com",databaseURL:"https://qwcv-1cfad-default-rtdb.firebaseio.com"});
                const auth = getAuth(app);
                onAuthStateChanged(auth, async (user) => {
                    if (user) {
                        const snap = await get(ref(getDatabase(app), 'users/' + user.uid));
                        const ud = snap.val() || {};
                        userPlan = ud.plan || 'free';
                        if (userPlan === 'pro' || userPlan === 'unlimited') {
                            // Check expiry
                            if (ud.planExpiry && Date.now() > ud.planExpiry) userPlan = 'free';
                        }
                        renderGrid('all');
                    }
                });
            } catch(e) {}
        })();

        function renderGrid(filter) {
            const templates = QCVTemplates.getAll();
            const grid = document.getElementById('tplGrid');
            const paid = userPlan === 'pro' || userPlan === 'unlimited';
            grid.innerHTML = templates
                .filter(t => filter === 'all' || t.category === filter)
                .map(t => {
                    const locked = !paid && !FREE_TEMPLATES.includes(t.id);
                    return `
                    <div class="tpl-card${locked ? ' locked' : ''}" data-cat="${t.category}">
                        <div class="tpl-preview">
                            <div class="tpl-preview-inner">${QCVTemplates.render(t.id, sampleData)}</div>
                        </div>
                        <div class="tpl-info">
                            <div class="tpl-name">${t.nameAr} — ${t.name}</div>
                            <div class="tpl-desc">${t.description}</div>
                            <div class="tpl-meta">
                                <span class="tpl-badge" style="background:${catColors[t.category]}22;color:${catColors[t.category]}">${categories[t.category]}</span>
                                ${locked
                                    ? `<button class="tpl-use" style="background:var(--border);color:var(--muted)" onclick="window.location.href='pay.html'">&#128274; اشترك لفتح القالب</button>`
                                    : `<button class="tpl-use" onclick="useTemplate('${t.id}')">استخدم هذا القالب</button>`
                                }
                            </div>
                        </div>
                    </div>`;
                }).join('');
        }

        function useTemplate(id) {
            if(window.QCVNotify) QCVNotify.click();
            localStorage.setItem('qcv_selected_template', id);
            window.location.href = 'editor.html';
        }

        function filterTpl(cat, el) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            renderGrid(cat);
        }

        renderGrid('all');
    </script>
