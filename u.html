<script>

firebase.initializeApp(firebaseConfig);
const db=firebase.database();
const base='https://qcv.vexonet.online';
let code='';
const pathMatch=window.location.pathname.match(/\/u\/([a-zA-Z0-9]+)/);
if(pathMatch){code=pathMatch[1];}
if(!code){const q=new URLSearchParams(window.location.search);code=q.get('code')||q.get('id')||'';}
if(code){
    db.ref('portfolioLinks/'+code).once('value').then(snap=>{
        const uid=snap.val();
        if(uid){window.location.replace(base+'/portfolio.html?uid='+uid);}
        else{window.location.replace(base+'/');}
    }).catch(()=>{window.location.replace(base+'/');});
}else{window.location.replace(base+'/');}
</script>
